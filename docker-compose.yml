services:
  mockingbird:
    build: .
    image: mockingbird:latest
    ports:
      - "9000:9000"
      # Mock service ports — add more as needed in mockingbird.yaml
      - "8081:8081"
      - "8082:8082"
      - "8083:8083"
      - "8084:8084"
    volumes:
      - ./mockingbird.yaml:/config/mockingbird.yaml
    environment:
      CONFIG_PATH: /config/mockingbird.yaml
      NODE_ENV: production
      # Referenced from mockingbird.yaml as ${KAFKA_USERNAME} / ${KAFKA_PASSWORD} etc.
      # (see ConfigService's ${VAR} substitution). Populate these via a local .env
      # file (gitignored) — see .env.example — instead of hardcoding secrets here.
      KAFKA_USERNAME: ${KAFKA_USERNAME:-}
      KAFKA_PASSWORD: ${KAFKA_PASSWORD:-}
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Single-node KRaft (no Zookeeper) broker for local testing of the Kafka
  # module's listen/send features. mockingbird.yaml points at it as
  # `kafka:9092` (the docker-compose service name, resolvable on the
  # internal network). Not exposed for auth — local/dev only.
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # Web UI for browsing topics/messages/consumer groups on the local broker.
  # http://localhost:8090 — kafbat/kafka-ui is the actively maintained fork
  # of the original (now-abandoned) provectus/kafka-ui. Host port is 8090
  # (not the image's default 8080) to avoid clashing with other local
  # services that commonly squat on 8080 — change if 8090 is also taken.
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

