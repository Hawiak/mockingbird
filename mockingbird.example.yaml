#     name: Main Kafka
#     type: kafka
#     config:
#       brokers: [kafka:9092]
#       sasl:
#         mechanism: PLAIN
#         username: ${KAFKA_USERNAME}
#         password: ${KAFKA_PASSWORD}
#       listeners:
#         - id: orders-created
#           topic: orders.created
#           # responseNode: { id: n1, kind: workflow, actions: [...] }  — see docs/workflows.md
#       triggers:
#         - id: start-order
#           name: Start Order
#           topic: orders.created
#           payload: '{"orderId": "{{uuid}}", "status": "created"}'
modules: []
parameterSets: []
